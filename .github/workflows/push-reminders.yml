name: Flow Push Reminders

on:
  schedule:
    - cron: '*/5 * * * *'  # כל 5 דקות (מינימום GitHub) — לבדיקה
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Push
        env:
          ONESIGNAL_APP_ID:   ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_KEY: ${{ secrets.ONESIGNAL_REST_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${ONESIGNAL_REST_KEY}" \
            https://onesignal.com/api/v1/notifications \
            -d "{
              \"app_id\": \"${ONESIGNAL_APP_ID}\",
              \"included_segments\": [\"Total Subscriptions\"],
              \"headings\": {\"he\": \"💧 Flow — זמן לשתות!\"},
              \"contents\": {\"he\": \"אל תשכח לשתות מים 💧\"}
            }")
          echo "OneSignal response: $RESPONSE"
          RECIPIENTS=$(echo "$RESPONSE" | grep -o '"recipients":[0-9]*' | grep -o '[0-9]*')
          echo "Recipients: ${RECIPIENTS:-unknown}"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "ERROR in response"
            exit 1
          fi
